name: AuthMeBia
description: $description
version: '0.0.4'
folia-supported: true
main: com.authmebia.AuthMeBia
loader: com.authmebia.AuthMeBiaLoader
api-version: '1.21'
load: POSTWORLD

authors: [mytai]
website: github.com/mytai20100/authmebia

dependencies:
  server:
    AuthMe:
      load: BEFORE
      required: true
      join-classpath: true

permissions:
  authmebia.bypass:
    description: Add or remove players from the dialog bypass list (/bia add, /bia rm)
    default: op
  bia.admin.recover:
    description: Force a player's password reset on next login (/bia recover)
    default: op
  bia.admin.debug:
    description: Simulate AuthMe API feature states in-game for testing (/bia debug)
    default: op
