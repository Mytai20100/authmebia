# AuthMeBia configuration.
# Text fields support full MiniMessage formatting, including:
#   Colors:      <red>, <gold>, <#4287f5>, <gradient:red:blue>, <rainbow>
#   Decorations: <bold>, <italic>, <underlined>, <strikethrough>, <obfuscated>
#   Font:        <font:minecraft:alt>text</font>
#   Hover:       <hover:show_text:'tooltip'>text</hover>
#   Click:       <click:open_url:'https://...'>text</click>
#   Keybind:     <key:jump>
# Use {player} as a placeholder for the player's name where supported.
# Use \n inside a string to insert a line break.

# Language code for messages (disconnect/kick, errors, chat).
# Built-in options: en (English), vi (Vietnamese).
# To add your own, copy plugins/AuthMeBia/lang/en.yml to lang/<code>.yml and edit it.
# Reload with /bia reload.
lang: en

# Bypass list: players added with /bia add <player> (alias of /authmebia add)
# never see any AuthMeBia dialog (captcha, register, login, or rule) and
# authenticate with AuthMe's own plain /login and /register commands
# instead. Remove a player with /bia rm <player>. This list has no key
# here in config.yml -- it is stored per player under
# plugins/AuthMeBia/data/<uuid>/player.yml, and managed entirely through
# those two commands. See doc/README.md for the full file format.

dialog:
  # Master switch for the register/login dialog feature.
  enabled: true

  # If true, the dialog is shown during the configuration phase, before the
  # player fully joins the world (blocks join until submitted).
  # If false, the dialog is shown right after the player spawns in-game instead.
  menu: true

  # Minimum client protocol version required to show the register/login
  # dialog. Dialogs are a vanilla feature added in Minecraft 1.21.6
  # (protocol 771); older clients cannot render dialog packets at all, so
  # forcing one on them just leaves their connection stuck instead of
  # showing an error.
  #
  # This check applies to both dialog paths: the pre-spawn dialog (menu:
  # true) and the in-game/post-spawn dialog (menu: false). If a connecting
  # client's protocol version is below this number, every AuthMeBia dialog
  # (captcha, register, login, rule) is skipped entirely for that player and
  # they join normally, using AuthMe's own /login and /register commands
  # instead (the regular AuthMe behavior with no dialog involved).
  #
  # This check only has an effect if ViaVersion (or a fork) is installed,
  # since that is what allows clients on a different protocol version to
  # connect in the first place. Without ViaVersion, every client is already
  # on the server's own version, so this setting has no effect.
  #
  # Common protocol numbers, for reference:
  #   771 = 1.21.6 (first version with dialog support)
  #   772 = 1.21.7 / 1.21.8
  #   773 = 1.21.9
  #   774 = 1.21.11
  # Full list: https://minecraft.wiki/w/Protocol_version
  min_protocol_version: 771

  # DEPRECATED / no longer used. The dialog-capability check now follows
  # AuthMe 6.0.0's approach: a single synchronous ViaVersion query that fails
  # OPEN (shows the dialog) when the version can't be resolved, instead of the
  # old bounded-wait poll that failed closed on a timing hiccup. This key is
  # kept only so existing configs don't error; it has no effect.
  protocol_detect_wait_ms: 500

  # Width in pixels of the main action buttons (Register/Login/Agree/Logout).
  # Valid range: 1-1024.
  button_width: 200

  # Width in pixels of the text input fields (password/confirm password).
  # Valid range: 1-1024.
  input_width: 200

  register:
    # Title shown at the top of the registration dialog.
    title: "<#4287f5>Create Account</#4287f5>"
    # Body text shown above the input fields. Leave empty for no body text.
    content: "<gray>Welcome, {player}! Please create a password to register.</gray>"
    # Label for the password input field.
    password_label: "Password"
    # Label for the confirm-password input field.
    confirm_password_label: "Confirm Password"
    # Sound played when clicking the Register/Submit button.
    submit_sound: ""

  login:
    # Title shown at the top of the login dialog.
    title: "<gold>Login</gold>"
    # Body text shown above the password field.
    content: "<gold>Welcome back, {player}!</gold>"
    # Label for the password input field.
    password_label: "Password"
    # Sound played when clicking the Login/Submit button.
    submit_sound: ""

  # Label of the button that disconnects the player instead of submitting.
  logout_button: "<red>Logout</red>"
  # Sound played when clicking the Logout button in any auth dialog.
  # Format: "namespace:sound.name" or "namespace:sound.name volume pitch"
  logout_sound: ""

  # Label of the button that submits the registration form.
  submit_register_button: "<green>Register</green>"

  # Label of the button that submits the login form.
  submit_login_button: "<green>Login</green>"

  # If false, re-opens the auth dialog immediately when the player dismisses
  # it (e.g. via ESC or clicking outside). This prevents bypassing auth by
  # closing the dialog. Only applies when dialog.menu is false (post-spawn mode);
  # in pre-spawn mode (menu: true) the dialog already blocks the connection, so
  # this setting has no effect there.
  allow_close: true

# Authentication input mode. Lets players authenticate with a numeric PIN or
# a per-digit slider grid instead of typing a password. The chosen mode
# applies to BOTH the register and login dialogs. State for pin/slider entry
# is tracked server-side per player UUID (never sent to the client as hidden
# dialog fields).
auth_mode:
  # Auth input mode for login and register dialogs.
  # Options:
  #   password - standard text input (current behavior, no change)
  #   pin      - numeric PIN entry using a 3-column button grid (numpad)
  #   slider   - numeric code entry using per-digit +/- buttons
  mode: password

  pin:
    # Number of digits in the PIN. Valid range: 4-8.
    length: 4
    # Title of the PIN entry dialog. Supports MiniMessage.
    title: "<gold>Enter your PIN</gold>"
    # Label of the confirm button.
    confirm_button: "<green>Confirm</green>"
    # Label of the delete-last-digit button.
    delete_button: "<red>⌫ Delete</red>"
    # Width in pixels of the numpad buttons (digits, delete, confirm).
    # Valid range: 1-1024. Lower this to make the numpad more compact.
    button_width: 100
    # Sound played when clicking any PIN numpad button (digits, delete, confirm).
    button_sound: ""

  slider:
    # Number of digits in the slider code. Valid range: 4-8.
    length: 4
    # Title of the slider entry dialog. Supports MiniMessage.
    title: "<gold>Enter your code</gold>"
    # Label of the confirm button.
    confirm_button: "<green>Confirm</green>"
    # Width in pixels of the slider buttons (the +/- and digit cells).
    # Valid range: 1-1024.
    button_width: 100
    # Sound played when clicking any slider button (+/-, confirm).
    button_sound: ""

# Grace period shown after submitting a register/login so the server has time
# to finish loading the account before AuthMeBia force-logs the player in.
# Without this small wait, a force-login can fire before AuthMe's datasource
# has the freshly-saved account ready, which is what causes "registered but not
# logged in" right after registering (especially with pin/slider).
auth_wait:
  # If true, show the wait dialog (below) during the grace period. If false,
  # a small built-in safety delay is still applied, just without a dialog.
  wait: true

  # Controls when the wait dialog is shown relative to the player joining.
  #
  # true  (default) - Show the wait dialog BEFORE the player fully spawns
  #                   (pre-spawn / configuration phase). This happens inside
  #                   the same blocking phase as the register/login dialogs,
  #                   so the player sees: [login/register dialog] → [wait dialog]
  #                   → spawns in-game already authenticated. The post-spawn
  #                   (postjoin) wait path is suppressed when this is true.
  #
  # false           - Show the wait dialog AFTER the player has spawned in-game
  #                   (post-spawn / postjoin path). The pre-spawn wait is skipped.
  #                   Use this if dialog.menu is false (post-spawn login mode).
  #
  # Rule of thumb: set this to match dialog.menu.
  #   dialog.menu: true  → auth_wait.prejoin: true   (both pre-spawn)
  #   dialog.menu: false → auth_wait.prejoin: false  (both post-spawn)
  prejoin: true

  # Length of the grace period in seconds. Valid range: 1-10.
  time: 3

  # Title of the wait dialog. Supports MiniMessage.
  title: "<gold>Please wait</gold>"

  # Body text of the wait dialog. Supports MiniMessage and \n.
  content: "<gray>Logging you in, please wait...</gray>"

rule:
  # If true, players must accept the server rules (after registering) before
  # they are allowed to join.
  enabled: false

  # Title of the rules dialog.
  title: "<gold>Server Rules</gold>"

  # Body text of the rules dialog. Supports \n for line breaks.
  content: ""

  # Label next to the agreement checkbox.
  checkbox_label: "<yellow>I have read and agree to the rules</yellow>"

  # Label of the button that confirms agreement. The checkbox must be ticked
  # for this to count as agreeing.
  agree_button: "<green>Agree</green>"
  # Sound played when clicking the Agree button in the rules dialog.
  agree_sound: ""

discord:
  # If true, sends a Discord webhook notification (e.g. on player join).
  enabled: false

  # Discord webhook URL to send notifications to. Required if enabled is true.
  webhook_url: ""

welcome_image:
  # If true, sends a welcome image to the player (see welcome.json for the
  # image configuration). For a full guide on customizing the welcome.json
  # canvas layout (background, avatar, text layers, fonts, etc.), see
  # plugins/AuthMeBia/doc/README.md.
  enabled: false

links:
  # Master switch for extra link/utility buttons shown in the dialogs
  # (e.g. Discord invite, copy server IP).
  enabled: false

  # How the link buttons are arranged relative to the main action buttons.
  # grouped:   link buttons are placed together with the main and logout
  #            buttons in a single block.
  # separated: link buttons are placed in their own row, separate from the
  #            logout button.
  position: grouped

  # Default width in pixels for link buttons that don't set their own width.
  # Valid range: 1-1024.
  button_width: 200

  # List of link buttons to display. Each entry supports:
  #   enabled - whether this specific button is shown.
  #   label   - button text, supports MiniMessage tags and {player}.
  #   action  - "open_url" to open a link, or "copy" to copy text/IP to clipboard.
  #   value   - the URL to open, or the text to copy.
  #   width   - button width in pixels, overrides the default button_width above.
  buttons:
    - enabled: true
      label: "<#5865F2>Discord</#5865F2>"
      action: open_url
      value: "https://discord.gg/abc"
      width: 200
    - enabled: true
      label: "<gray>{player}, copy IP</gray>"
      action: copy
      value: "play.example.com"
      width: 200

captcha:
  # Master switch for the captcha dialog. This plugin generates its own
  # captcha code (it does not read AuthMe's internal captcha state, since
  # that is not exposed through AuthMe's public API). The same caveat is
  # documented in the source as a `// CAPTCHA NOTE:` comment in AuthMe.java.
  #
  # When enabled, this also requires AuthMe's own captcha.useCaptcha option
  # to be true in AuthMe's config.yml. If AuthMe has it disabled, the
  # captcha dialog here will not trigger either, even if enabled below is
  # true. This keeps the two plugins' protection settings in sync.
  enabled: false

  # Number of random characters in the generated captcha code.
  # Valid range: 4-10.
  length: 5

  # Title of the captcha dialog.
  title: "<gold>Verification</gold>"

  # Body text of the captcha dialog. Use {code} to show the generated code.
  content: "<gray>Type the code below to continue:</gray>\n<white><bold>{code}</bold></white>"

  # Label of the input field where the player types the code.
  input_label: "Enter code"

  # Label of the button that submits the typed code.
  submit_button: "<green>Verify</green>"
  # Sound played when clicking the Verify button in the captcha dialog.
  submit_sound: ""

  # How long (in seconds) a successful captcha verification is trusted for,
  # so the player isn't asked again on every join during this window.
  # Default: 5 hours (18000 seconds).
  trust_duration_seconds: 18000

login_attempts:
  # If true, kicks the player after too many wrong password attempts in a
  # single login dialog session.
  enabled: false

  # Number of wrong password attempts allowed before the player is kicked.
  max_tries: 5

login_timeout:
  # If true, kicks or re-shows the dialog if the player hasn't authenticated
  # within the time limit after the auth dialog is first shown.
  enabled: false

  # Time in seconds the player has to complete authentication before being
  # kicked. Set to 0 to disable the kick and just re-show the dialog instead.
  # Valid range: 10-3600.
  seconds: 60

  # Kick message shown to the player if they time out. Supports MiniMessage.
  kick_message: "<red>Authentication timed out. Please reconnect.</red>"

recover:
  # Admin-forced password reset. Run /bia recover <player> (permission
  # bia.admin.recover) to flag a player; on their next login (or immediately
  # if they are online) they are shown this two-field reset dialog instead of
  # the normal login dialog. The flag is stored per player under
  # plugins/AuthMeBia/data/<uuid>/player.yml (the same file as the bypass list).

  # Title of the reset dialog. Supports MiniMessage.
  title: "<gold>Reset Password</gold>"

  # Body text of the reset dialog. Supports MiniMessage.
  content: "<gray>An admin has requested you set a new password.</gray>"

  # Label for the new password input field.
  new_password_label: "New password"

  # Label for the confirm password input field.
  confirm_password_label: "Confirm password"

  # Label of the submit button. Supports MiniMessage.
  submit_button: "<green>Set Password</green>"
  # Sound played when clicking the Set Password button.
  submit_sound: ""

  # Message sent to the player (chat) on successful reset.
  # Supports MiniMessage and {player}.
  success_message: "<green>Password updated successfully.</green>"

  # Message sent to the player (chat) if the two fields don't match.
  # Supports MiniMessage.
  mismatch_message: "<red>Passwords do not match. Try again.</red>"

email:
  # Email verification on registration. When enabled, AuthMeBia adds an email
  # input below the password field; after the player submits the register form
  # a code is emailed to them and they must enter it in a verify dialog before
  # the account is created.
  #
  # This only takes effect if AuthMe Reloaded itself has email/SMTP configured
  # (Email.mailAccount + Email.mailPassword + Email.mailSMTP in AuthMe's
  # config.yml). AuthMeBia reuses AuthMe's SMTP settings to send the code, so
  # there is no separate SMTP config here. If AuthMe has no email configured,
  # this feature stays off even when enabled is true.
  #
  # Only applies to auth_mode: password (the email field sits under the password
  # input). PIN/slider modes have no text field and are unaffected.
  enabled: false

  # Number of digits in the emailed verification code. Valid range: 4-8.
  code_length: 6

  # Cooldown in seconds before the player can press Resend again.
  # Valid range: 10-600.
  resend_cooldown: 60

  # Label of the email input field added under the password.
  field_label: "Email"

  # Verify dialog title. Supports MiniMessage.
  verify_title: "<gold>Verify your email</gold>"

  # Verify dialog body. Supports MiniMessage and \n. {email} = the entered
  # email, {cooldown} = seconds remaining before Resend is available.
  verify_content: "<gray>A code was sent to {email}.\nResend available in {cooldown}s.</gray>"

  # Label of the code input field in the verify dialog.
  code_label: "Code"

  # Label of the verify button.
  verify_button: "<green>Verify</green>"
  # Sound played when clicking the Verify button in the email verify dialog.
  verify_sound: ""

  # Label of the resend button (when cooldown has expired).
  resend_button: "<yellow>Resend code</yellow>"
  # Sound played when clicking the Resend button.
  resend_sound: ""

  # Label of the resend button while the cooldown is still active.
  # Use {cooldown} for the remaining seconds.
  resend_button_cooldown: "<gray>Resend ({cooldown}s)</gray>"

  # Messages (chat). Support MiniMessage and {player}.
  # Shown when the entered email is not a valid address.
  invalid_email_message: "<red>Please enter a valid email address.</red>"
  # Shown when the code could not be emailed (SMTP error).
  send_failed_message: "<red>Could not send the email. Please contact an admin.</red>"

  # Error shown inline in the verify dialog when the code is wrong.
  wrong_code_error: "Incorrect code"

totp_2fa:
  # If true, players who have TOTP/2FA enabled in AuthMe will be shown a
  # two-factor authentication dialog after entering their password.
  # Requires AuthMe to have TOTP support (5.6+).
  enabled: false

  # Title of the 2FA dialog. Supports MiniMessage.
  title: "<gold>Two-Factor Authentication</gold>"

  # Body text of the 2FA dialog. Supports MiniMessage and \n.
  content: "<gray>Enter your 6-digit authenticator app code:</gray>"

  # Label of the code input field.
  input_label: "Authenticator code"

  # Label of the verify button. Supports MiniMessage.
  submit_button: "<green>Verify</green>"
  # Sound played when clicking the Verify button in the 2FA dialog.
  submit_sound: ""

  # Error shown inline when the code is wrong.
  wrong_code_error: "Invalid code"

# Custom dialog screens — a mini-framework for showing fully custom dialogs.
#
# Show a screen manually: /bia screen <id> [player]
#
# Each screen supports:
#   id           - unique identifier used with /bia screen <id>
#   enabled      - true/false, disables the screen without removing it (default: true)
#   title        - dialog title, supports full MiniMessage
#   content      - dialog body, supports MiniMessage and \n
#   allow_close  - whether the player can dismiss with ESC (default: true)
#   button_width - default button width in pixels for this screen (default: dialog.button_width)
#   trigger      - when this screen is automatically shown:
#                    command  (default) - only via /bia screen
#                    postjoin           - shown after the player authenticates and spawns in-game
#                    prejoin            - shown during the pre-spawn phase (blocking), after auth
#   sound_on_show - Minecraft sound played when the screen opens (in-game only).
#                   Format: "namespace:sound.name" or "namespace:sound.name volume pitch"
#                   Example: "minecraft:ui.button.click 1.0 1.0"
#
# Each button supports:
#   label   - button text, full MiniMessage + {player}
#   action  - close, open_url, copy, command (as player), console (as console)
#   value   - URL/text/command depending on action; supports {player}
#   width   - button width in pixels (overrides button_width)
#   sound   - Minecraft sound played when this button is clicked (in-game only)
#             Format: "namespace:sound.name" or "namespace:sound.name volume pitch"
#
# Use {player} in title, content, and button values/labels as a placeholder.
custom_screens:
  - id: example
    enabled: true
    title: "<gold>Server Notice</gold>"
    content: "<gray>Welcome to the server, <yellow>{player}</yellow>!\nHave fun playing.</gray>"
    allow_close: true
    button_width: 200
    trigger: command
    sound_on_show: ""
    buttons:
      - label: "<green>OK</green>"
        action: close
        sound: "minecraft:ui.button.click"
      - label: "<#5865F2>Discord</#5865F2>"
        action: open_url
        value: "https://discord.gg/abc"
        width: 200

  # Example: auto-show after authentication (postjoin trigger)
  # - id: welcome_notice
  #   enabled: false
  #   title: "<gradient:gold:yellow>Welcome!</gradient>"
  #   content: "<gray>Hello, <white>{player}</white>!\nEnjoy your stay.</gray>"
  #   allow_close: true
  #   trigger: postjoin
  #   sound_on_show: "minecraft:entity.player.levelup 0.5 1.2"
  #   buttons:
  #     - label: "<green>Play!</green>"
  #       action: close
  #       sound: "minecraft:ui.button.click"
  #     - label: "<aqua>Rules</aqua>"
  #       action: command
  #       value: "/rules"

ip_ban:
  # If true, temporarily bans an IP address after repeated wrong password
  # attempts across login sessions from that IP (spam/brute-force
  # protection). Ban duration escalates with repeated offenses.
  enabled: false

  # Number of wrong password attempts from the same IP (across sessions)
  # before the first temporary ban is issued.
  threshold: 10

  # Ban durations in seconds for each escalation level. The 1st offense
  # uses the 1st value, the 2nd offense uses the 2nd value, and so on.
  # The last value is reused for any further offense beyond the list.
  ban_durations_seconds: [600, 1800, 3600, 86400]
