# AuthMeBia language file - English
# Supports MiniMessage tags: <red>, <gold>, <bold>, etc.
# Placeholders: {player} = player name, {player_ip} = player IP address

# Disconnect / kick messages (shown in the disconnect screen)
disconnect:
  verification_failed: "<red>Verification failed."
  registration_cancelled: "<red>Registration cancelled."
  must_agree_rules: "<red>You must agree to the rules."
  login_failed: "<red>Login failed."
  logout: "<gray>You have been disconnected."
  too_many_attempts: "<red>Too many failed login attempts."
  ip_banned: "<red>Your IP (<yellow>{player_ip}</yellow>) has been temporarily banned due to too many failed login attempts."

# In-dialog inline error labels (appended to the input field label)
error:
  wrong_password: "Wrong password"
  password_empty: "Password cannot be empty"
  passwords_mismatch: "Passwords do not match"
  captcha_incorrect: "Incorrect code"

# In-game chat messages (shown to the player after they spawn)
message:
  wrong_password: "<red>Wrong password."
  password_empty_or_mismatch: "<red>Password is empty or does not match."
